name: Daily Close Scanner

on:
  schedule:
    - cron: '30 20 * * 1-5'   # 20:30 UTC = 15:30 EST (market close) Mon–Fri
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode to run'
        required: true
        default: 'fast'
        type: choice
        options:
          - fast
          - full

# ── Daily Close — Fast Scan + Backtest (20:30 UTC / 15:30 EST) ───────────────
jobs:
  daily-close-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    env:
      ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
      POLYGON_API_KEY:       ${{ secrets.POLYGON_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
      STREAMLIT_URL:         ${{ secrets.STREAMLIT_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: mkdir -p logs

      - name: Run scan
        run: npm run scan -- --mode=${{ github.event.inputs.mode || 'fast' }}

      - name: Run backtest
        run: npm run backtest

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add OPPORTUNITIES.md logs/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily close scan $(date -u +'%Y-%m-%d %H:%M')"
            git pull --rebase -X ours origin main
            git push
          fi
